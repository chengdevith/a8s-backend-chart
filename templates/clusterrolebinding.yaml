apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: a8s-backend-cluster-admin
subjects:
  - kind: ServiceAccount
    name: {{ include "a8s-backend.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}

roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
