apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: a8s-backend-namespace-manager
rules:
  - apiGroups: [""]
    resources:
      - namespaces
      - serviceaccounts
      - secrets
      - configmaps
      - pods
      - services
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete

  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - roles
      - rolebindings
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete